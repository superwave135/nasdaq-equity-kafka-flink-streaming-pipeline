# ──────────────────────────────────────────────────────────────────────────────
# Kafka Connect — S3 Sink Connector Configuration
# Replaces AWS Kinesis Firehose with a self-managed open-source equivalent.
# Reads from Kafka topics and writes partitioned JSON files to S3.
# ──────────────────────────────────────────────────────────────────────────────

# ── Connector Identity ─────────────────────────────────────────────────────
name=s3-sink-enriched-ticks
connector.class=io.confluent.connect.s3.S3SinkConnector
tasks.max=1

# ── Source Topics ──────────────────────────────────────────────────────────
# Reads all three processed Kafka topics into separate S3 prefixes
topics=enriched-ticks,vwap-ticks,alerts

# ── S3 Configuration ───────────────────────────────────────────────────────
# Bucket name injected via environment variable in ECS task definition
s3.region=${S3_REGION}
s3.bucket.name=${S3_PROCESSED_BUCKET}
s3.part.size=5242880                      # 5 MB multipart upload parts

# ── S3 Path / Partitioning ─────────────────────────────────────────────────
# Writes to: s3://bucket/<topic>/date=YYYY-MM-DD/<partition>/<offset>.json
s3.part.retries=3
topics.dir=${kafka.topic}
store.kafka.keys=false
store.kafka.headers=false

# Partition by topic + day (aligns with Glue ETL partitioning scheme)
partitioner.class=io.confluent.connect.storage.partitioner.TimeBasedPartitioner
path.format='date'=YYYY-MM-dd
partition.duration.ms=3600000             # new S3 prefix every hour
locale=en_US
timezone=UTC
timestamp.extractor=RecordField
timestamp.field=timestamp                 # uses the event timestamp field

# ── Storage Format ─────────────────────────────────────────────────────────
format.class=io.confluent.connect.s3.format.json.JsonFormat
storage.class=io.confluent.connect.s3.storage.S3Storage

# Flush every 1000 records OR every 60 seconds — whichever comes first
flush.size=1000
rotate.interval.ms=60000
rotate.schedule.interval.ms=120000

# ── Schema ────────────────────────────────────────────────────────────────
# No schema registry needed — raw JSON pass-through
schemas.enable=false
schema.compatibility=NONE

# ── Error Handling ────────────────────────────────────────────────────────
errors.tolerance=none                     # fail fast on serialisation errors
errors.log.enable=true
errors.log.include.messages=true

# ── Offsets ───────────────────────────────────────────────────────────────
# Store connector offsets in Kafka (standard Connect behaviour)
offset.storage.topic=connect-offsets
config.storage.topic=connect-configs
status.storage.topic=connect-status
offset.storage.replication.factor=1
config.storage.replication.factor=1
status.storage.replication.factor=1
