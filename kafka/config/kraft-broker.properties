# ──────────────────────────────────────────────────────────────────────────────
# Kafka KRaft Mode Configuration
# Single-node combined broker+controller for portfolio project
# Production would use 3 separate controller nodes for quorum
# ──────────────────────────────────────────────────────────────────────────────

# Node identity
node.id=1

# KRaft: this node acts as both broker and controller
# In production, separate these roles across 3+ nodes
process.roles=broker,controller

# Controller quorum — single node for dev/portfolio
controller.quorum.voters=1@localhost:9093

# ── Listeners ──────────────────────────────────────────────────────────────
# PLAINTEXT for internal ECS service-to-service communication
# CONTROLLER for KRaft metadata quorum
listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093

# Advertised to producers/consumers — uses ECS service discovery DNS
# Override via KAFKA_ADVERTISED_LISTENERS env var in task definition
advertised.listeners=PLAINTEXT://kafka:9092

listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
inter.broker.listener.name=PLAINTEXT
controller.listener.names=CONTROLLER

# ── Storage ────────────────────────────────────────────────────────────────
# EFS mount point — persists logs between daily pipeline runs
log.dirs=/var/kafka/data

# ── Topic Defaults ─────────────────────────────────────────────────────────
num.partitions=3
# Single broker — no replication
default.replication.factor=1
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1

# ── Retention ──────────────────────────────────────────────────────────────
# Retain messages for 2 hours — covers the 1-hour pipeline window with buffer
log.retention.hours=2
# 512 MB max per partition
log.retention.bytes=536870912
# 64 MB segment size
log.segment.bytes=67108864

# ── Performance (tuned for low-volume portfolio workload) ──────────────────
num.network.threads=2
num.io.threads=4
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

# ── Group Coordinator ──────────────────────────────────────────────────────
# Reduce rebalance delay for faster consumer startup
group.initial.rebalance.delay.ms=0

# ── Auto Topic Creation ────────────────────────────────────────────────────
# Topics are pre-created by Terraform; disable auto-creation for safety
auto.create.topics.enable=false
