###############################################################################
# CI/CD — Deploy Stock Streaming Pipeline
# Uses GitHub OIDC to authenticate with AWS (no long-lived secrets)
# Mirrors the pattern from nasdaq-equity-airflow-ecs-pipeline
###############################################################################

name: Deploy Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:    # allow manual trigger from GitHub UI

env:
  AWS_REGION:     ap-southeast-1
  ECR_REGISTRY:   ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com
  TF_WORKING_DIR: terraform

permissions:
  id-token: write     # required for OIDC token exchange
  contents: read

jobs:
  # ── Lint & Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r lambda/producer/requirements.txt
          pip install pytest pytest-mock flake8

      - name: Lint
        run: flake8 lambda/ flink/ glue/ --max-line-length=120 --ignore=E501,W503,E221,E241,E131,E123

      - name: Unit tests
        run: pytest tests/ -v

  # ── Terraform Plan ──────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Lambda packages
        run: |
          for fn in producer controller teardown status; do
            BUILD_DIR="terraform/modules/lambda/.build/${fn}/package"
            mkdir -p "$BUILD_DIR"
            cp "lambda/${fn}"/*.py "$BUILD_DIR/"
            pip install -r "lambda/${fn}/requirements.txt" \
              -t "$BUILD_DIR/" --quiet --upgrade
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file=envs/dev/terraform.tfvars \
            -var="owner=${{ github.actor }}" \
            -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          # Include the Lambda zip files created by archive_file during plan.
          # archive_file has depends_on=[terraform_data.pip_install] which defers
          # its evaluation in the apply job (different runner, fresh filesystem).
          # Uploading zips here ensures the apply job has them at the right path.
          path: |
            terraform/tfplan
            terraform/modules/lambda/.build/producer.zip
            terraform/modules/lambda/.build/controller.zip
            terraform/modules/lambda/.build/teardown.zip
            terraform/modules/lambda/.build/status.zip

  # ── Build & Push Container Images ──────────────────────────────────────────
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [kafka, kafka-connect, flink-jobmanager, flink-taskmanager]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/stock-streaming-dev-${{ matrix.service }}:${{ github.sha }}
          docker build \
            -t $IMAGE \
            -f docker/${{ matrix.service }}/Dockerfile \
            .
          docker push $IMAGE
          # Also tag as latest
          docker tag $IMAGE ${{ env.ECR_REGISTRY }}/stock-streaming-dev-${{ matrix.service }}:latest
          docker push ${{ env.ECR_REGISTRY }}/stock-streaming-dev-${{ matrix.service }}:latest

  # ── Terraform Apply ─────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [terraform-plan, build-images]
    if: github.ref == 'refs/heads/main'
    environment: dev    # requires manual approval in GitHub Environments
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Lambda packages
        run: |
          for fn in producer controller teardown status; do
            BUILD_DIR="terraform/modules/lambda/.build/${fn}/package"
            mkdir -p "$BUILD_DIR"
            cp "lambda/${fn}"/*.py "$BUILD_DIR/"
            pip install -r "lambda/${fn}/requirements.txt" \
              -t "$BUILD_DIR/" --quiet --upgrade
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Upload Glue scripts to S3
        run: |
          aws s3 cp glue/jobs/ \
            s3://$(terraform -chdir=terraform output -raw s3_scripts_bucket)/glue-scripts/ \
            --recursive
